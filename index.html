      { title: "ADMC_CATEGORY_QUERY_ITEM", nameImg: "admc-category-query-item", desc: "Представляет отдельный элемент запроса в консоли ADMC. Используется для отображения результатов поиска или сохраненных запросов к Active Directory. Используется в QueryItemImpl для представления результатов запросов. Представляет папку с запросами в консоли ADMC. Содержит сохраненные запросы и позволяет организовывать их в иерархическую структуру. Используется в QueryFolderImpl для группировки запросов" },

      { title: "OBJECT_CATEGORY_LOST_AND_FOUND", nameImg: "object-category-lost-and-found", desc: "Представляет контейнер 'Lost and Found' в Active Directory. Это системный контейнер, который автоматически создается в каждом домене и используется для хранения объектов, которые не могут быть корректно размещены в иерархии домена из-за конфликтов или проблем с репликацией. Когда система не может определить правильное местоположение для объекта, он помещается в этот контейнер. Используется для отображения и управления объектами, которые были 'потеряны' системой и требуют ручного размещения в правильной иерархии домена." },

    function createTable(dataArray, containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;

      const table = document.createElement('table');

      // Заголовки
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      ['Название', '16', '24', 'Описание'].forEach((text, i) => {
        const th = document.createElement('th');
        th.textContent = text;
        if (i === 1 || i === 2) th.classList.add('center');
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      // Тело
      const tbody = document.createElement('tbody');
      dataArray.forEach(item => {
        const tr = document.createElement('tr');

        // Название (title)
        const tdTitle = document.createElement('td');
        tdTitle.textContent = item.title ?? item.nameImg;
        tr.appendChild(tdTitle);

        if(item.nameImg){

          // Иконка 16px
          const td16 = document.createElement('td');
          td16.classList.add('center');
          const img16 = document.createElement('img');
          img16.src = path16 + item.nameImg + ".svg";
          img16.alt = item.nameImg + " 16px";
          img16.className = "icon-16";
          td16.appendChild(img16);
          tr.appendChild(td16);

          // Иконка 24px
          const td24 = document.createElement('td');
          td24.classList.add('center');
          const img24 = document.createElement('img');
          img24.src = path24 + item.nameImg + ".svg";
          img24.alt = item.nameImg + " 24px";
          img24.className = "icon-24";
          td24.appendChild(img24);
          tr.appendChild(td24);
        } else {
          // Иконка 16px
          const td16 = document.createElement('td');
          tr.appendChild(td16);

          // Иконка 24px
          const td24 = document.createElement('td');
          tr.appendChild(td24);
        }


        // Описание
        const tdDesc = document.createElement('td');
        tdDesc.textContent = item.desc ?? '';
        tdDesc.classList.add('muted');
        tr.appendChild(tdDesc);

        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      container.innerHTML = '';
      container.appendChild(table);
    }
